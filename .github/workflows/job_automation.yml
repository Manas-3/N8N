async function scrapeAllSources(seenUrls) {
  const all = [];
  const sources = [
    scrapeRemotive,
    scrapeTheMuse,
    scrapeJobicy,
    scrapeAdzuna,
    scrapeGreenhouse,
    scrapeLever,
  ];

  for (const fn of sources) {
    try {
      const jobs = await fn();
      all.push(...jobs);
      await sleep(250); // gentle pacing
    } catch (e) {
      log('error', `Source crashed: ${e.message}`, { source: fn.name });
    }
  }

  // FIX #5: Improved dedup — guard against jobs with no URL or title collapsing together.
  const seen = new Set();
  const deduped = [];
  for (const j of all) {
    // Skip completely blank entries
    if (!j.url && !j.title) continue;

    const k = `${(j.url || '').toLowerCase()}|${(j.title || '').toLowerCase()}|${(j.company || '').toLowerCase()}`;
    if (seen.has(k)) continue;
    seen.add(k);
    deduped.push(j);
  }

  // FIX #3: Filter out jobs already processed in a previous run.
  const newJobs = deduped.filter((j) => !j.url || !seenUrls.has(j.url));

  log('info', `Total scraped: ${all.length}, deduped: ${deduped.length}, new (unseen): ${newJobs.length}`);
  return newJobs;
}

// ----------------------------- AI scoring ----------------------------

function buildPrompt(job) {
  const desired = (profile.desired_roles || []).join(', ');
  const skills = [
    ...(profile.skills?.marketing_and_gtm || []),
    ...(profile.skills?.content_and_comms || []),
    ...(profile.skills?.technical_domain || []),
    ...(profile.skills?.software_and_tools || []),
    ...(profile.skills?.soft_skills || []),
  ].join(', ');

  const exp = (profile.experience || [])
    .map((e) => `${e.title} @ ${e.company} (${e.period}): ${e.highlights?.join('; ')}`)
    .join('\n');

  return [
    `You are an applicant tracking assistant.`,
    `Score this job for the candidate from 0 to 100.`,
    `Return STRICT JSON ONLY with keys: score (number), reasons (array of strings), must_have_gaps (array of strings).`,
    ``,
    `Candidate:`,
    `- Name: ${profile.name}`,
    `- Location: ${profile.location}`,
    `- Desired roles: ${desired}`,
    `- Experience years: ${profile.experience_years}`,
    `- Skills: ${skills}`,
    `- Experience:\n${exp}`,
    ``,
    `Job:`,
    `- Title: ${job.title}`,
    `- Company: ${job.company}`,
    `- Location: ${job.location}`,
    `- Source: ${job.source}`,
    `- URL: ${job.url}`,
    `- Description: ${safeText(job.description, 1200)}`,
  ].join('\n');
}

async function groqChatCompletion(prompt) {
  if (!GROQ_API_KEY) {
    throw new Error('GROQ_API_KEY missing');
  }

  const url = 'https://api.groq.com/openai/v1/chat/completions';
  const body = {
    model: GROQ_MODEL,
    messages: [
      { role: 'system', content: 'You are a precise JSON-only generator.' },
      { role: 'user', content: prompt },
    ],
    temperature: 0.2,
  };

  const data = await postJSON(url, body, {
    headers: {
      Authorization: `Bearer ${GROQ_API_KEY}`,
    },
    timeoutMs: 45000,
  });

  const content = data?.choices?.[0]?.message?.content || '';
  return String(content);
}

// FIX #2: Retry wrapper with exponential backoff for Groq 429 rate-limit responses.
async function groqChatCompletionWithRetry(prompt, retries = 3) {
  for (let attempt = 0; attempt < retries; attempt++) {
    try {
      return await groqChatCompletion(prompt);
    } catch (e) {
      const isRateLimit = e.message.includes('429');
      const isLastAttempt = attempt === retries - 1;
      if (isRateLimit && !isLastAttempt) {
        const delay = 2000 * (attempt + 1);
        log('warn', `Groq rate-limited (429), retrying in ${delay}ms`, { attempt });
        await sleep(delay);
      } else {
        throw e;
      }
    }
  }
}

// FIX #11: Strip markdown code fences before JSON extraction in case the model disobeys.
function tryParseJsonStrict(text) {
  const s = String(text || '')
    .replace(/```[a-z]*\n?/gi, '') // strip opening fences like ```json
    .replace(/```/g, '')            // strip closing fences
    .trim();

  const firstBrace = s.indexOf('{');
  const lastBrace = s.lastIndexOf('}');
  if (firstBrace === -1 || lastBrace === -1 || lastBrace <= firstBrace) {
    throw new Error('No JSON object found in AI response');
  }
  const jsonStr = s.slice(firstBrace, lastBrace + 1);
  return JSON.parse(jsonStr);
}

// FIX #6: Concurrent AI scoring using a small worker pool instead of serial execution.
async function scoreJobsWithAI(jobs, concurrency = 4) {
  const scored = [];
  const queue = [...jobs];

  async function worker() {
    while (queue.length > 0) {
      const job = queue.shift();
      if (!job) break;
      try {
        const prompt = buildPrompt(job);
        const raw = await groqChatCompletionWithRetry(prompt);
        const parsed = tryParseJsonStrict(raw);

        const score = Number(parsed.score);
        if (!Number.isFinite(score)) throw new Error('AI score is not a number');

        scored.push({
          ...job,
          ai_score: score,
          ai_reasons: Array.isArray(parsed.reasons) ? parsed.reasons.slice(0, 6) : [],
          ai_gaps: Array.isArray(parsed.must_have_gaps) ? parsed.must_have_gaps.slice(0, 6) : [],
        });

        log('info', 'Scored job', { title: job.title, company: job.company, score });
      } catch (e) {
        log('error', `AI scoring failed: ${e.message}`, {
          title: job.title,
          company: job.company,
          source: job.source,
        });
      }
    }
  }

  // Launch `concurrency` workers in parallel
  await Promise.all(Array.from({ length: concurrency }, worker));
  return scored;
}

// ------------------------- filtering / report ------------------------

function passesFilters(job) {
  const minScore = Number(profile.job_filters?.min_ai_score ?? 60);
  const exclude = (profile.job_filters?.exclude_keywords || []).map((k) => String(k).toLowerCase());

  const hay = `${job.title} ${job.company} ${job.description}`.toLowerCase();

  if (Number.isFinite(minScore) && (job.ai_score ?? 0) < minScore) return false;

  for (const k of exclude) {
    if (k && hay.includes(k)) return false;
  }

  if (profile.job_filters?.require_remote) {
    const loc = String(job.location || '').toLowerCase();
    if (!loc.includes('remote')) return false;
  }

  return true;
}

function renderHtmlReport(scoredJobs) {
  const top = [...scoredJobs].sort((a, b) => (b.ai_score || 0) - (a.ai_score || 0));
  const rows = top
    .map((j) => {
      const reasons = (j.ai_reasons || []).map((r) => `<li>${escapeHtml(r)}</li>`).join('');
      const gaps = (j.ai_gaps || []).map((g) => `<li>${escapeHtml(g)}</li>`).join('');
      return `
        <tr>
          <td style="padding:10px;border-bottom:1px solid #eee;">
            <div style="font-weight:600;">${escapeHtml(j.title)}</div>
            <div style="color:#555;">${escapeHtml(j.company)} • ${escapeHtml(j.location)} • ${escapeHtml(j.source)}</div>
            <div style="margin-top:6px;">
              <a href="${escapeAttr(j.url)}" target="_blank" rel="noopener noreferrer">View job</a>
            </div>
          </td>
          <td style="padding:10px;border-bottom:1px solid #eee;text-align:center;font-weight:700;">
            ${Number.isFinite(j.ai_score) ? j.ai_score : '—'}
          </td>
          <td style="padding:10px;border-bottom:1px solid #eee;">
            <div style="font-weight:600;">Why it fits</div>
            <ul>${reasons || '<li>(none)</li>'}</ul>
            <div style="font-weight:600;margin-top:8px;">Gaps</div>
            <ul>${gaps || '<li>(none)</li>'}</ul>
          </td>
        </tr>
      `.trim();
    })
    .join('\n');

  return `
  <html>
    <body style="font-family:Arial, sans-serif;">
      <h2>Daily Job Report (${escapeHtml(ymd())})</h2>
      <p>Dry run: <b>${DRY_RUN ? 'true' : 'false'}</b></p>
      <p>Candidate: ${escapeHtml(profile.name)} (${escapeHtml(profile.location)})</p>

      <table style="border-collapse:collapse;width:100%;max-width:1100px;">
        <thead>
          <tr>
            <th style="text-align:left;border-bottom:2px solid #ddd;padding:10px;">Job</th>
            <th style="text-align:center;border-bottom:2px solid #ddd;padding:10px;width:90px;">Score</th>
            <th style="text-align:left;border-bottom:2px solid #ddd;padding:10px;">Notes</th>
          </tr>
        </thead>
        <tbody>
          ${rows || '<tr><td colspan="3" style="padding:10px;">No matching jobs today.</td></tr>'}
        </tbody>
      </table>
    </body>
  </html>
  `.trim();
}

function escapeHtml(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function escapeAttr(s) {
  return escapeHtml(s).replace(/`/g, '&#96;');
}

function writeReportFiles(payload) {
  const base = `report_${ymd()}_${Date.now()}`;
  const jsonPath = path.join(REPORT_DIR, `${base}.json`);
  const htmlPath = path.join(REPORT_DIR, `${base}.html`);

  fs.writeFileSync(jsonPath, JSON.stringify(payload, null, 2), 'utf8');
  fs.writeFileSync(htmlPath, payload.html || '', 'utf8');

  return { jsonPath, htmlPath };
}

// -------------------------------- email ------------------------------

async function sendEmailReport(subject, html) {
  if (DRY_RUN) {
    log('info', 'DRY_RUN enabled: skipping email send', { subject });
    return { skipped: true };
  }

  if (EMAIL_PROVIDER === 'none') {
    log('info', 'EMAIL_PROVIDER=none: skipping email send', { subject });
    return { skipped: true };
  }

  if (!EMAIL_API_KEY) {
    throw new Error('EMAIL_API_KEY missing');
  }

  // Reference implementation for Resend
  if (EMAIL_PROVIDER === 'resend') {
    const data = await postJSON(
      'https://api.resend.com/emails',
      {
        from: EMAIL_FROM,
        to: [EMAIL_TO],
        subject,
        html,
      },
      {
        headers: { Authorization: `Bearer ${EMAIL_API_KEY}` },
        timeoutMs: 30000,
      }
    );
    return data;
  }

  throw new Error(`Unsupported EMAIL_PROVIDER: ${EMAIL_PROVIDER}`);
}

// -------------------------------- main -------------------------------

async function main() {
  log('info', 'Job automation started', { dry_run: DRY_RUN });

  // FIX #3: Load seen-jobs cache to skip already-processed listings.
  const seenUrls = loadSeenJobs();
  log('info', `Seen-jobs cache loaded`, { count: seenUrls.size });

  const jobs = await scrapeAllSources(seenUrls);
  if (!jobs.length) {
    log('warn', 'No new jobs found (all already seen or no results from sources).');
  }

  const scored = await scoreJobsWithAI(jobs);

  // FIX #3: Persist newly seen URLs so next run skips them.
  for (const j of scored) {
    if (j.url) seenUrls.add(j.url);
  }
  saveSeenJobs(seenUrls);

  const filtered = scored.filter(passesFilters);
  filtered.sort((a, b) => (b.ai_score || 0) - (a.ai_score || 0));

  const html = renderHtmlReport(filtered);

  const payload = {
    date: ymd(),
    candidate: {
      name: profile.name,
      email: profile.email,
      location: profile.location,
      desired_roles: profile.desired_roles,
    },
    dry_run: DRY_RUN,
    totals: {
      scraped: jobs.length,
      scored: scored.length,
      matched: filtered.length,
    },
    jobs: filtered,
    html,
  };

  const paths = writeReportFiles(payload);
  log('info', 'Report written', paths);

  const subject = `Daily Job Report - ${ymd()} (${filtered.length} matches)`;
  const emailRes = await sendEmailReport(subject, html);
  log('info', 'Email send result', { result: emailRes });

  log('info', 'Job automation finished', { matched: filtered.length });
}

main().catch((e) => {
  log('error', `Fatal: ${e.message}`, { stack: e.stack });
  process.exitCode = 1;
});
