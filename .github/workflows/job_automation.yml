#!/usr/bin/env node
/**
 * Job Automation Agent - Standalone Runner
 * Scrapes jobs, evaluates fit with AI (Groq), and sends a daily report email.
 *
 * Sources (implemented here):
 * - Remotive
 * - TheMuse
 * - Jobicy
 *
 * Sources (stubs provided here, can be extended):
 * - Adzuna (requires app_id/app_key)
 * - Greenhouse (company boards)
 * - Lever (company boards)
 */

'use strict';

const https = require('https');
const fs = require('fs');
const path = require('path');
const { URL } = require('url');

// ----------------------------- utilities -----------------------------
// FIX #1: sanitizeApiKey moved above all const declarations that call it.

function sanitizeApiKey(key) {
  // Remove characters that can break HTTP headers (control chars, non-ASCII)
  // Keep visible ASCII (0x20-0x7E)
  return String(key || '')
    .split('')
    .filter((ch) => {
      const code = ch.charCodeAt(0);
      return code >= 0x20 && code <= 0x7e;
    })
    .join('')
    .trim();
}

function nowIso() {
  return new Date().toISOString();
}

function ymd() {
  return new Date().toISOString().slice(0, 10);
}

function sleep(ms) {
  return new Promise((r) => setTimeout(r, ms));
}

function stripHtml(html) {
  return String(html || '')
    .replace(/<style[^>]*>[\s\S]*?<\/style>/gi, ' ')
    .replace(/<script[^>]*>[\s\S]*?<\/script>/gi, ' ')
    .replace(/<[^>]*>/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function safeText(x, maxLen = 600) {
  const s = String(x || '').replace(/\s+/g, ' ').trim();
  return s.length > maxLen ? s.slice(0, maxLen - 1) + '…' : s;
}

// ----------------------------- config --------------------------------

const PROFILE_PATH = path.join(__dirname, '../config/candidate_profile.json');
const REPORT_DIR = path.join(__dirname, '../reports');
const LOG_DIR = path.join(__dirname, '../logs');

// FIX #4: DRY_RUN now defaults to 'false'. Set DRY_RUN=true in env to suppress emails.
const DRY_RUN = (process.env.DRY_RUN || 'false') === 'true';
const GROQ_API_KEY = sanitizeApiKey(process.env.GROQ_API_KEY || '');
const GROQ_MODEL = process.env.GROQ_MODEL || 'llama-3.1-70b-versatile';

// Email config
const EMAIL_PROVIDER = process.env.EMAIL_PROVIDER || 'resend'; // 'resend' | 'none'
const EMAIL_API_KEY = (process.env.EMAIL_API_KEY || '').trim();
const EMAIL_FROM = (process.env.EMAIL_FROM || '').trim();
const EMAIL_TO = (process.env.EMAIL_TO || '').trim();

// FIX #10: Wrap directory creation — fail fast with a clear message instead of a cryptic stack trace.
try {
  [REPORT_DIR, LOG_DIR].forEach((dir) => fs.mkdirSync(dir, { recursive: true }));
} catch (e) {
  console.error(`[FATAL] Failed to create required directories: ${e.message}`);
  process.exit(1);
}

// Seen-jobs cache path (FIX #3)
const SEEN_JOBS_PATH = path.join(LOG_DIR, 'seen_jobs.json');

// Load and validate profile
let profile;
try {
  profile = JSON.parse(fs.readFileSync(PROFILE_PATH, 'utf8'));
} catch (e) {
  console.error(`[FATAL] Could not load candidate_profile.json: ${e.message}`);
  process.exit(1);
}

// FIX #9: Validate required profile fields at startup so bad prompts fail loudly.
const REQUIRED_PROFILE_FIELDS = ['name', 'location', 'desired_roles', 'skills', 'experience'];
for (const field of REQUIRED_PROFILE_FIELDS) {
  if (!profile[field]) {
    console.error(`[FATAL] Missing required profile field: "${field}"`);
    process.exit(1);
  }
}

// FIX #7: Validate email address format at startup.
const EMAIL_REGEX = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
if (!DRY_RUN && EMAIL_PROVIDER !== 'none') {
  if (!EMAIL_REGEX.test(EMAIL_FROM)) {
    console.error(`[FATAL] EMAIL_FROM is missing or invalid: "${EMAIL_FROM}"`);
    process.exit(1);
  }
  if (!EMAIL_REGEX.test(EMAIL_TO)) {
    console.error(`[FATAL] EMAIL_TO is missing or invalid: "${EMAIL_TO}"`);
    process.exit(1);
  }
}

// ----------------------------- logging -------------------------------

function log(level, message, data = {}) {
  const entry = { timestamp: nowIso(), level, message, ...data };
  const line = JSON.stringify(entry);
  console.log(line);
  fs.appendFileSync(path.join(LOG_DIR, `run_${ymd()}.log`), line + '\n');
}

if (DRY_RUN) {
  // FIX #4: Make DRY_RUN state unmissably visible so prod misconfiguration is caught immediately.
  log('warn', '*** DRY_RUN is active — emails will NOT be sent. Set DRY_RUN=false to enable. ***');
}

// ----------------------------- HTTP helpers --------------------------

// FIX #8: fetchJSON now follows HTTP 301/302 redirects (up to maxRedirects hops).
function fetchJSON(url, opts = {}, _redirectCount = 0) {
  const maxRedirects = opts.maxRedirects ?? 5;
  return new Promise((resolve, reject) => {
    const u = new URL(url);
    const req = https.request(
      {
        method: 'GET',
        hostname: u.hostname,
        path: u.pathname + u.search,
        headers: {
          'User-Agent': opts.userAgent || 'JobBot/1.0',
          Accept: 'application/json',
          ...(opts.headers || {}),
        },
        timeout: opts.timeoutMs || 15000,
      },
      (res) => {
        // Follow redirects
        if ([301, 302, 303, 307, 308].includes(res.statusCode) && res.headers.location) {
          if (_redirectCount >= maxRedirects) {
            return reject(new Error(`Too many redirects for ${url}`));
          }
          // Consume response body to free socket
          res.resume();
          return fetchJSON(res.headers.location, opts, _redirectCount + 1)
            .then(resolve)
            .catch(reject);
        }

        let data = '';
        res.on('data', (chunk) => (data += chunk));
        res.on('end', () => {
          if (res.statusCode && res.statusCode >= 400) {
            return reject(new Error(`HTTP ${res.statusCode} from ${url}: ${data.slice(0, 200)}`));
          }
          try {
            resolve(JSON.parse(data));
          } catch (e) {
            reject(new Error(`Failed to parse JSON from ${url}: ${e.message}`));
          }
        });
      }
    );

    req.on('error', reject);
    req.on('timeout', () => {
      req.destroy();
      reject(new Error(`Timeout: ${url}`));
    });
    req.end();
  });
}

function postJSON(url, body, opts = {}) {
  return new Promise((resolve, reject) => {
    const u = new URL(url);
    const payload = JSON.stringify(body);
    const req = https.request(
      {
        method: 'POST',
        hostname: u.hostname,
        path: u.pathname + u.search,
        headers: {
          'User-Agent': opts.userAgent || 'JobBot/1.0',
          Accept: 'application/json',
          'Content-Type': 'application/json',
          'Content-Length': Buffer.byteLength(payload),
          ...(opts.headers || {}),
        },
        timeout: opts.timeoutMs || 30000,
      },
      (res) => {
        let data = '';
        res.on('data', (chunk) => (data += chunk));
        res.on('end', () => {
          if (res.statusCode && res.statusCode >= 400) {
            return reject(new Error(`HTTP ${res.statusCode} from ${url}: ${data.slice(0, 400)}`));
          }
          try {
            resolve(JSON.parse(data));
          } catch (e) {
            // Some APIs may return empty body on 200/202
            resolve({ raw: data });
          }
        });
      }
    );

    req.on('error', reject);
    req.on('timeout', () => {
      req.destroy();
      reject(new Error(`Timeout: ${url}`));
    });
    req.write(payload);
    req.end();
  });
}

// ----------------------------- seen-jobs cache (FIX #3) --------------

function loadSeenJobs() {
  try {
    if (fs.existsSync(SEEN_JOBS_PATH)) {
      return new Set(JSON.parse(fs.readFileSync(SEEN_JOBS_PATH, 'utf8')));
    }
  } catch (e) {
    log('warn', `Could not load seen_jobs cache, starting fresh: ${e.message}`);
  }
  return new Set();
}

function saveSeenJobs(seenSet) {
  try {
    fs.writeFileSync(SEEN_JOBS_PATH, JSON.stringify([...seenSet]), 'utf8');
  } catch (e) {
    log('warn', `Could not save seen_jobs cache: ${e.message}`);
  }
}

// ----------------------------- job sources ---------------------------

async function scrapeRemotive() {
  try {
    const query = encodeURIComponent(profile.desired_roles?.[0] || 'marketing');
    const url = `https://remotive.com/api/remote-jobs?search=${query}&limit=50`;
    const data = await fetchJSON(url);

    const jobs = (data.jobs || []).map((job) => ({
      source: 'Remotive',
      title: job.title || '',
      company: job.company_name || 'Unknown',
      location: job.candidate_required_location || 'Remote',
      url: job.url || '',
      description: safeText(stripHtml(job.description || ''), 800),
      tags: job.tags || [],
      published_at: job.publication_date || '',
    }));

    log('info', `Remotive: scraped ${jobs.length} jobs`);
    return jobs;
  } catch (e) {
    log('error', `Remotive failed: ${e.message}`);
    return [];
  }
}

async function scrapeTheMuse() {
  try {
    const query = encodeURIComponent(profile.desired_roles?.[0] || 'marketing');
    const url = `https://www.themuse.com/api/public/jobs?category=${query}&page=1`;
    const data = await fetchJSON(url);

    const jobs = (data.results || []).map((job) => ({
      source: 'TheMuse',
      title: job.name || '',
      company: job.company?.name || 'Unknown',
      location: (job.locations || []).map((l) => l.name).join(', ') || 'Remote',
      url: job.refs?.landing_page || '',
      description: safeText(stripHtml(job.contents || ''), 800),
      tags: (job.categories || []).map((c) => c.name),
      published_at: job.publication_date || '',
    }));

    log('info', `TheMuse: scraped ${jobs.length} jobs`);
    return jobs;
  } catch (e) {
    log('error', `TheMuse failed: ${e.message}`);
    return [];
  }
}

async function scrapeJobicy() {
  try {
    const query = encodeURIComponent(profile.desired_roles?.[0] || 'marketing');
    const url = `https://jobicy.com/api/v2/remote-jobs?count=50&tag=${query}`;
    const data = await fetchJSON(url);

    const jobs = (data.jobs || []).map((job) => ({
      source: 'Jobicy',
      title: job.jobTitle || job.title || '',
      company: job.companyName || 'Unknown',
      location: job.jobGeo || 'Remote',
      url: job.url || job.jobLink || '',
      description: safeText(stripHtml(job.jobDescription || job.description || ''), 800),
      tags: job.jobTags || [],
      published_at: job.pubDate || '',
    }));

    log('info', `Jobicy: scraped ${jobs.length} jobs`);
    return jobs;
  } catch (e) {
    log('error', `Jobicy failed: ${e.message}`);
    return [];
  }
}

